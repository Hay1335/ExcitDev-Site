<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExcitDev | Hub</title>
    <style>
        :root {
            --bg-color: #080a0f;
            --accent-blue: #00a2ff;
            --glow-blue: rgba(0, 162, 255, 0.4);
            --text-color: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #101a2b 0%, #080a0f 100%);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            background: rgba(8, 10, 15, 0.8);
            backdrop-filter: blur(15px);
            padding: 20px;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid rgba(0, 162, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: #888;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        nav a:hover {
            color: var(--accent-blue);
            text-shadow: 0 0 8px var(--glow-blue);
        }

        /* Hero Section */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .main-title {
            font-size: clamp(3rem, 10vw, 5rem);
            margin: 0;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(180deg, #fff 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #888;
            font-size: 1.2rem;
            max-width: 600px;
            margin: 20px 0;
        }

        /* Pulsing Status */
        .status-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--glass);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(0, 162, 255, 0.2);
            margin-bottom: 30px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--accent-blue);
            border-radius: 50%;
            box-shadow: 0 0 0 var(--accent-blue);
            animation: pulse-blue 2s infinite;
        }

        @keyframes pulse-blue {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 162, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 162, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 162, 255, 0); }
        }

        /* Action Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--glow-blue);
        }

        .btn-secondary {
            border: 1px solid #333;
            color: #fff;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #555;
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Servers</a></li>
            <li><a href="#">Socials</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="hero">
        <div class="status-container">
            <div class="pulse"></div>
            <span style="font-size: 0.8rem; color: var(--accent-blue); font-weight: 700; text-transform: uppercase;">Node Active</span>
        </div>
        
        <h1 class="main-title">EXCITDEV</h1>
        <p class="subtitle">Youtuber, Minecraft / discord server owner. Developer</p>

        <div class="btn-group">
            <a href="#" class="btn btn-primary">Join Discord</a>
            <a href="#" class="btn btn-secondary">View Services</a>
        </div>
    </div>

</body>
</html>
