<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - System Offline</title>
    <style>
        body { background-color: #0f0f12; color: #e2e8f0; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; border: 1px solid #27272a; padding: 40px; border-radius: 12px; background: #18181b; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .status-dot { height: 12px; width: 12px; background-color: #ef4444; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #ef4444; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: #a1a1aa; margin-bottom: 24px; }
        .btn { text-decoration: none; color: #000; background: #f4f4f5; padding: 10px 20px; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #d4d4d8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-dot"></div>
        <span>SYSTEM ERROR 404</span>
        <h1>Route Not Found</h1>
        <p>The requested module is unavailable or the link is broken.</p>
        <a href="/" class="btn">Return to Dashboard</a>
    </div>
</body>
</html>
